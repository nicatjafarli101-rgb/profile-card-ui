<!DOCTYPE html>
<html>
<head>
<style>

    P {
        font-weight: bold;
        margin: 20px;
        font-size: 20px;
    }

    .container {
    display:flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    width: 100%;
    gap: 30px;
    }

    .card {
        border: 1px solid #195dca;
        padding: 80px;
        border-radius: 40px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
        width:250px;
        background-color:aquamarine ;
        cursor: pointer;
        transition: 0.3s;
        transform: scale(1.05);
        font-size: 16px;
         opacity: 0.8;
    }

    .name {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
      gap: 10px;
      

    }



    img {
      width: 200px;
      height:100px;
      border-radius: 30%;
      margin-bottom: 30px;
      position: relative;
      top: 10px;
      left: 30px;
      align-items: 20px;

    
    
    }


    .button {
        padding: 10px 20px;
        background-color: rgb(0,255,255)
        border:none;
        border-radius: 20px;
</style>
</head>
